services:
  mysql:
    image: mysql:8.0
    container_name: emp-payroll-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-emp_payroll_secret}
      MYSQL_DATABASE: emp_payroll
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: emp-payroll-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data

  server:
    build:
      context: .
      dockerfile: docker/Dockerfile.server.prod
    container_name: emp-payroll-server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      HOST: 0.0.0.0
      DB_PROVIDER: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-emp_payroll_secret}
      DB_NAME: emp_payroll
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      PAYROLL_COUNTRY: IN
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  client:
    build:
      context: .
      dockerfile: docker/Dockerfile.client.prod
      args:
        VITE_API_URL: /api/v1
    container_name: emp-payroll-client
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    depends_on:
      - server

volumes:
  mysql_data:
  redis_data:
