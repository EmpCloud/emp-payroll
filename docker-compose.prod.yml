services:
  mysql:
    image: mysql:8.0
    container_name: emp-payroll-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-emp_payroll_secret}
      MYSQL_DATABASE: emp_payroll
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/init-empcloud-db.sql:/docker-entrypoint-initdb.d/01-empcloud.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: emp-payroll-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data

  server:
    build:
      context: .
      dockerfile: docker/Dockerfile.server.prod
    container_name: emp-payroll-server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      HOST: 0.0.0.0
      DB_PROVIDER: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-emp_payroll_secret}
      DB_NAME: emp_payroll
      EMPCLOUD_DB_HOST: mysql
      EMPCLOUD_DB_PORT: 3306
      EMPCLOUD_DB_USER: root
      EMPCLOUD_DB_PASSWORD: ${DB_PASSWORD:-emp_payroll_secret}
      EMPCLOUD_DB_NAME: empcloud
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      CORS_ORIGIN: "*"
      PAYROLL_COUNTRY: IN
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  client:
    build:
      context: .
      dockerfile: docker/Dockerfile.client.prod
      args:
        VITE_API_URL: /api/v1
    container_name: emp-payroll-client
    restart: unless-stopped
    depends_on:
      - server

  ngrok:
    image: ngrok/ngrok:latest
    container_name: emp-payroll-ngrok
    restart: "no"
    command: http http://client:80 --authtoken ${NGROK_AUTHTOKEN} --url juniper-squirrelly-alterably.ngrok-free.dev
    ports:
      - "4041:4040"
    depends_on:
      - client
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}

volumes:
  mysql_data:
  redis_data:
